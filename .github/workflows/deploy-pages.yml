name: Deploy Nexiom Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SITE_DIR: _site

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html not found at repository root."
            exit 1
          fi

          cp "index.html" "$SITE_DIR/index.html"

          if [ -d "assets" ]; then cp -R "assets" "$SITE_DIR/assets"; fi
          if [ -d "css" ]; then cp -R "css" "$SITE_DIR/css"; fi
          if [ -d "js" ]; then cp -R "js" "$SITE_DIR/js"; fi
          if [ -f "privacidad.html" ]; then cp "privacidad.html" "$SITE_DIR/privacidad.html"; fi
          if [ -f "robots.txt" ]; then cp "robots.txt" "$SITE_DIR/robots.txt"; fi
          if [ -f "sitemap.xml" ]; then cp "sitemap.xml" "$SITE_DIR/sitemap.xml"; fi

          if [ ! -f "$SITE_DIR/robots.txt" ]; then
            printf '%s\n' 'User-agent: *' 'Allow: /' > "$SITE_DIR/robots.txt"
          fi

          printf '%s\n' \
            '<!doctype html>' \
            '<html lang="es">' \
            '<head>' \
            '  <meta charset="utf-8">' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1">' \
            '  <title>Nexiom | Página no encontrada</title>' \
            '</head>' \
            '<body style="font-family:Arial,sans-serif;padding:3rem;line-height:1.5;background:#061A32;color:white;">' \
            '  <h1>Nexiom</h1>' \
            '  <p>La página solicitada no existe o fue movida.</p>' \
            '  <p><a style="color:#C99A4A;font-weight:bold;" href="./">Volver al inicio</a></p>' \
            '</body>' \
            '</html>' > "$SITE_DIR/404.html"

          echo "Prepared site files:"
          find "$SITE_DIR" -maxdepth 3 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
