name: Deploy Nexiom Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site

          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found at repository root."
            exit 1
          fi

          cp index.html _site/index.html

          # Optional public assets if they exist later.
          [ -d assets ] && cp -R assets _site/assets || true
          [ -d css ] && cp -R css _site/css || true
          [ -d js ] && cp -R js _site/js || true
          [ -f privacidad.html ] && cp privacidad.html _site/privacidad.html || true
          [ -f robots.txt ] && cp robots.txt _site/robots.txt || true
          [ -f sitemap.xml ] && cp sitemap.xml _site/sitemap.xml || true

          if [ ! -f _site/robots.txt ]; then
            cat > _site/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF
          fi

          cat > _site/404.html <<'EOF'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Nexiom | Página no encontrada</title>
          </head>
          <body style="font-family:Arial,sans-serif;padding:3rem;line-height:1.5;background:#061A32;color:white;">
            <h1>Nexiom</h1>
            <p>La página solicitada no existe o fue movida.</p>
            <p><a style="color:#C99A4A;font-weight:bold;" href="./">Volver al inicio</a></p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
